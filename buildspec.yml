version: 0.2

env:
  variables:
    NODE_ENV: production
  parameter-store:
    NEXT_PUBLIC_EMAILJS_SERVICE_ID: /portfolio/emailjs/service_id
    NEXT_PUBLIC_EMAILJS_TEMPLATE_ID: /portfolio/emailjs/template_id
    NEXT_PUBLIC_EMAILJS_PUBLIC_KEY: /portfolio/emailjs/public_key

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo Installing dependencies...
      - npm ci

  pre_build:
    commands:
      - echo Running linter...
      - npm run lint || true
      - echo "Creating .env.local with EmailJS credentials..."
      - |
        cat > .env.local << EOF
        NEXT_PUBLIC_EMAILJS_SERVICE_ID=$NEXT_PUBLIC_EMAILJS_SERVICE_ID
        NEXT_PUBLIC_EMAILJS_TEMPLATE_ID=$NEXT_PUBLIC_EMAILJS_TEMPLATE_ID
        NEXT_PUBLIC_EMAILJS_PUBLIC_KEY=$NEXT_PUBLIC_EMAILJS_PUBLIC_KEY
        EOF

  build:
    commands:
      - echo Building Next.js application...
      - npm run build

  post_build:
    commands:
      - echo Build completed on `date`

artifacts:
  files:
    - '**/*'
  base-directory: '.'

cache:
  paths:
    - 'node_modules/**/*'
    - '.next/cache/**/*'
