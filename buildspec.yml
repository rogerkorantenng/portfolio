version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo Installing dependencies...
      - npm ci

  pre_build:
    commands:
      - echo Running linter...
      - npm run lint || true

  build:
    commands:
      - echo Building Next.js application...
      - npm run build

  post_build:
    commands:
      - echo Copying static files for standalone build...
      - cp -r .next/static .next/standalone/.next/static
      - cp -r public .next/standalone/public || true
      - echo Build completed on `date`

artifacts:
  files:
    - '**/*'
  base-directory: '.'

cache:
  paths:
    - 'node_modules/**/*'
    - '.next/cache/**/*'
